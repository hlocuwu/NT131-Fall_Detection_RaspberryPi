<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VILBE IoT &mdash; Fall Statistics</title>
  <link rel="stylesheet" href="/custom/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app-wrapper">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">VILBE IoT</div>
      <div class="logo-sub">Fall Detection System</div>
    </div>
    <div class="nav-section-title">Navigation</div>
    <a class="nav-item" href="/"><span class="nav-icon">&#127968;</span> Dashboard</a>
    <a class="nav-item" href="/camera"><span class="nav-icon">&#128247;</span> Live Monitor</a>
    <a class="nav-item" href="/chart"><span class="nav-icon">&#128202;</span> System Metrics</a>
    <a class="nav-item active" href="/fallchart"><span class="nav-icon">&#128201;</span> Fall Statistics</a>
    <div class="sidebar-footer">&copy; 2024 NT131 &bull; Group 04 &bull; UIT</div>
  </aside>

  <div class="main-wrapper">
    <header class="app-header">
      <span class="header-title">Fall Statistics</span>
      <div class="search-box">
        <span class="search-icon">&#128269;</span>
        <input type="text" placeholder="Search...">
      </div>
      <div class="header-actions">
        <div class="notif-wrapper">
          <div class="icon-btn" title="Notifications">&#128276;</div>
          <div class="notif-badge"></div>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">
          <span id="themeIcon">&#9728;&#65039;</span>
          <span id="themeText">Light</span>
        </button>
        <div class="avatar" title="Admin">A</div>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div class="page-title">Fall Detection Analytics</div>
        <div class="page-breadcrumb" id="dateDisplay">Loading date...</div>
      </div>

      <div class="chart-grid">
        <div class="chart-card">
          <div class="card-title">Hourly Distribution</div>
          <div class="card-subtitle" id="hourlySubtitle">Today&apos;s fall events by hour</div>
          <canvas id="hourlyChart" style="max-height:350px;"></canvas>
        </div>
        <div class="chart-card">
          <div class="card-title">Daily Distribution</div>
          <div class="card-subtitle">This month&apos;s fall events by day</div>
          <canvas id="dailyChart" style="max-height:350px;"></canvas>
        </div>
      </div>
    </main>
  </div>
</div>

<script type="module" src="/custom/auth-guard.js"></script>
<script>
  function getTheme() { return localStorage.getItem('theme') || 'light'; }
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    var dark = t === 'dark';
    document.getElementById('themeIcon').textContent = dark ? '\u{1F319}' : '\u2600\uFE0F';
    document.getElementById('themeText').textContent = dark ? 'Dark' : 'Light';
  }
  function toggleTheme() {
    var next = getTheme() === 'light' ? 'dark' : 'light';
    localStorage.setItem('theme', next); applyTheme(next);
  }

  function chartOpts(dark, xTitle, yTitle) {
    var tc = dark ? '#90CAF9' : '#4A6FA5';
    var gc = dark ? 'rgba(144,202,249,0.10)' : 'rgba(0,119,182,0.10)';
    return {
      responsive: true, maintainAspectRatio: false, animation: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true,
             ticks: { stepSize: 1, precision: 0, color: tc },
             grid: { color: gc },
             title: { display: true, text: yTitle || 'Falls', color: tc } },
        x: { ticks: { color: tc }, grid: { color: gc },
             title: { display: true, text: xTitle || '', color: tc } }
      }
    };
  }

  var hourlyChart, dailyChart;

  function updateCharts() {
    fetch('/fall_stats').then(function(r){ return r.json(); }).then(function(data) {
      if (hourlyChart) { hourlyChart.data.labels = Object.keys(data.hourly); hourlyChart.data.datasets[0].data = Object.values(data.hourly); hourlyChart.update(); }
      if (dailyChart)  { dailyChart.data.labels  = Object.keys(data.daily);  dailyChart.data.datasets[0].data  = Object.values(data.daily);  dailyChart.update(); }
    });
  }

  window.onload = function() {
    applyTheme(getTheme());
    var dark = getTheme() === 'dark';
    var now = new Date();
    document.getElementById('dateDisplay').textContent =
      'Date: ' + now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('hourlySubtitle').textContent =
      'Today (' + now.toLocaleDateString() + ') — fall events by hour';

    fetch('/fall_stats').then(function(r){ return r.json(); }).then(function(data) {
      hourlyChart = new Chart(document.getElementById('hourlyChart'), {
        type: 'bar',
        data: { labels: Object.keys(data.hourly), datasets: [{
          label: 'Fall Events', data: Object.values(data.hourly),
          backgroundColor: 'rgba(0,180,216,0.65)', borderColor: '#00B4D8',
          borderWidth: 2, borderRadius: 6
        }] },
        options: chartOpts(dark, 'Hour of Day', 'Number of Falls')
      });

      dailyChart = new Chart(document.getElementById('dailyChart'), {
        type: 'bar',
        data: { labels: Object.keys(data.daily), datasets: [{
          label: 'Fall Events', data: Object.values(data.daily),
          backgroundColor: 'rgba(0,245,212,0.65)', borderColor: '#00F5D4',
          borderWidth: 2, borderRadius: 6
        }] },
        options: chartOpts(dark, 'Day of Month', 'Number of Falls')
      });

      setInterval(updateCharts, 60000);
    });
  };
</script>

</body>
</html>
